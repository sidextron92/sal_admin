name: Scheduled Sync

on:
  schedule:
    # Runs at :30 past these UTC hours — translates to IST schedule:
    # Peak   (every 2h): 09:00, 11:00, 13:00, 15:00, 17:00, 19:00 IST → 03:30, 05:30, 07:30, 09:30, 11:30, 13:30 UTC
    # Off-peak (every 4h): 23:00, 03:00, 07:00 IST → 17:30, 21:30, 01:30 UTC
    - cron: "30 1,3,5,7,9,11,13,17,21 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  sync-shopify-products:
    name: Sync Shopify Products
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/sync?type=shopify-products" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail --silent --show-error

  sync-shopify-orders:
    name: Sync Shopify Orders
    runs-on: ubuntu-latest
    needs: sync-shopify-products
    steps:
      - name: Trigger sync
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/sync?type=shopify-orders" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail --silent --show-error

  sync-shiprocket:
    name: Sync Shiprocket
    runs-on: ubuntu-latest
    needs: sync-shopify-orders
    steps:
      - name: Trigger sync
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/sync?type=shiprocket" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail --silent --show-error
